version: 2

project_name: recall

before:
  hooks:
    - go mod tidy
    - go vet -tags sqlite_fts5 ./...

builds:
  - main: .
    binary: recall
    env:
      # CGO_ENABLED=1 is required for go-sqlcipher (SQLCipher / AES-256 encryption).
      # Binary integrity is ensured via cosign signing and SLSA provenance
      # rather than pure static linking.
      - CGO_ENABLED=1
    # sqlite_fts5 enables FTS5 full-text search virtual tables.
    # Must match the build tag used in Makefile and CI.
    tags:
      - sqlite_fts5
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Om-Rohilla/recall/cmd.Version={{.Version}}
      - -X github.com/Om-Rohilla/recall/cmd.BuildDate={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - scripts/hooks/recall.zsh
      - scripts/hooks/recall.bash
      - scripts/hooks/recall.fish
      - data/knowledge.json

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# cosign signs each archive and the checksums file using Sigstore keyless signing.
# Users can verify: cosign verify-blob --bundle <file>.bundle <file>
signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    args:
      - sign-blob
      - --yes
      - --bundle=${signature}
      - ${artifact}
    artifacts: checksum
    output: true

snapshot:
  name_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - Merge pull request
      - Merge branch

# Homebrew formula for CLI installation via `brew install Om-Rohilla/tap/recall`.
# skip_upload: auto — silently skips if the tap repo is unavailable or the
# token lacks write access, so release does not fail on missing tap.
brews:
  - repository:
      owner: Om-Rohilla
      name: homebrew-tap
    name: recall
    homepage: "https://github.com/Om-Rohilla/recall"
    description: "100% offline command intelligence for your terminal"
    skip_upload: "auto"

release:
  github:
    owner: Om-Rohilla
    name: recall
  name_template: "v{{.Version}}"
