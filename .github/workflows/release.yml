name: Release

on:
  push:
    tags:
      - "v*"

# Required for Sigstore keyless (OIDC) signing — id-token:write and
# attestations:write allow cosign to obtain an OIDC token from GitHub Actions.
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      # Install libsqlite3-dev and gcc for CGO / go-sqlcipher build.
      - name: Install CGO build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      # Install cosign for keyless binary signing via Sigstore.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          # cosign keyless signing uses OIDC — no private key required.
          COSIGN_EXPERIMENTAL: "1"
