name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Build Linux binary on a native Ubuntu runner
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install CGO dependencies
        run: sudo apt-get update && sudo apt-get install -yq --no-install-recommends gcc libsqlite3-dev

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: build --clean --id linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Build macOS binaries on a native macOS runner
# ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      # Xcode Command Line Tools provide clang — no extra install needed.
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: build --clean --id darwin-amd64 --id darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist/
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Merge artifacts and publish GitHub Release + Homebrew formula
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: dist-macos
          path: dist/

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --skip=build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
