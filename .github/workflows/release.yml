name: Release

on:
  push:
    tags:
      - "v*"

# Required for Sigstore keyless (OIDC) signing — id-token:write and
# attestations:write allow cosign to obtain an OIDC token from GitHub Actions.
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      # Install libsqlite3-dev and gcc as fallback for CGO.
      - name: Install CGO build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update && sudo apt-get install -yq --no-install-recommends gcc libsqlite3-dev gcc-aarch64-linux-gnu gcc-mingw-w64

      # Install Zig for pristine magical CGO Cross-Compilation.
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      # Unlock the Go module cache so Zig can write lock files during concurrent cross-compilation
      - name: Unlock Go Module Cache for Zig
        run: chmod -R a+w ~/go/pkg/mod || true

      # Install cosign for keyless binary signing via Sigstore.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean -p 1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          # cosign keyless signing uses OIDC — no private key required.
          COSIGN_EXPERIMENTAL: "1"
          ZIG_GLOBAL_CACHE_DIR: ${{ runner.temp }}/zig-cache
