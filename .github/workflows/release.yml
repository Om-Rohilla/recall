name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

# ─────────────────────────────────────────────────────────────────────────────
# Single job on macos-latest:
# - macOS runner has native clang for darwin builds (amd64 + arm64)
# - It also has Rosetta cross-tools, so linux/amd64 builds via musl/zig
# We use goreleaser-pro split only on free tier: just run full release here.
#
# APPROACH: Run the full goreleaser release on macos-latest.
#   darwin builds: native clang (zero extra deps)
#   linux/amd64:   CGO cross-compile using zig cc targeting x86_64-linux-musl
#                  This works because zig handles pure C (sqlite3.c) perfectly
#                  on the link step — NO Go internal linker is used for CGO.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  release:
    name: Release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      # Install Zig — only needed for the Linux cross-compile target.
      # macOS targets use native clang automatically.
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          ZIG_GLOBAL_CACHE_DIR: ${{ runner.temp }}/zig-cache

