name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Auto-reads the required version from go.mod — never out-of-sync again.
          go-version-file: "go.mod"
          cache: true

      # go-sqlcipher requires CGO and libsqlite3-dev to compile.
      # Without this step every go build / go test fails at link time.
      - name: Install CGO build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      - name: Vet
        run: go vet -tags sqlite_fts5 ./...

      - name: Test
        run: go test -tags sqlite_fts5 ./... -count=1 -race -timeout 300s

      - name: Build
        run: CGO_ENABLED=1 go build -tags sqlite_fts5 -o /dev/null .

      - name: Staticcheck
        continue-on-error: true
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck -tags sqlite_fts5 ./...
