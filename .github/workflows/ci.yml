name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Auto-reads the required version from go.mod — never out-of-sync again.
          go-version-file: "go.mod"
          cache: true

      # go-sqlcipher requires CGO and libsqlite3-dev to compile.
      # Without this step every go build / go test fails at link time.
      - name: Install CGO build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      - name: Vet
        run: go vet -tags sqlite_fts5 ./...

      - name: Test
        run: go test -tags sqlite_fts5 ./... -count=1 -race -timeout 300s

      - name: Build Binary
        run: CGO_ENABLED=1 go build -tags sqlite_fts5 -ldflags "-X main.version=ci-test" -o recall_test_bin .

      - name: Smoke Test — version flag
        run: |
          ./recall_test_bin --version
          ./recall_test_bin --version | grep -E "v?[0-9]+\.[0-9]+"

      - name: Smoke Test — help flag
        run: ./recall_test_bin --help

      - name: Smoke Test — plugin install requires --accept-risk
        run: |
          ./recall_test_bin plugin install /dev/null 2>&1 | grep -i "accept-risk"

      - name: Smoke Test — plugin install rejects non-WASM
        run: |
          ./recall_test_bin plugin install /dev/null --accept-risk 2>&1 | grep -i "invalid WASM"

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck -tags sqlite_fts5 ./...
