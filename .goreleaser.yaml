version: 2

project_name: recall

before:
  hooks:
    - go mod tidy

builds:
  # Linux AMD64 — compiled natively on ubuntu-latest runner
  - id: linux-amd64
    main: .
    binary: recall
    env:
      - CGO_ENABLED=1
      - CC=gcc
      - CXX=g++
    goos:
      - linux
    goarch:
      - amd64
    tags:
      - sqlite_fts5
    ldflags:
      - -s -w
      - -X github.com/Om-Rohilla/recall/cmd.Version={{.Version}}
      - -X github.com/Om-Rohilla/recall/cmd.BuildDate={{.Date}}

  # macOS AMD64 (Intel) — compiled natively on macos-latest runner
  - id: darwin-amd64
    main: .
    binary: recall
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
    tags:
      - sqlite_fts5
    ldflags:
      - -X github.com/Om-Rohilla/recall/cmd.Version={{.Version}}
      - -X github.com/Om-Rohilla/recall/cmd.BuildDate={{.Date}}

  # macOS ARM64 (Apple Silicon) — compiled natively on macos-latest runner
  - id: darwin-arm64
    main: .
    binary: recall
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
    tags:
      - sqlite_fts5
    ldflags:
      - -X github.com/Om-Rohilla/recall/cmd.Version={{.Version}}
      - -X github.com/Om-Rohilla/recall/cmd.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE
      - src: scripts/hooks/*
        dst: hooks
      - src: data/knowledge.json
        dst: data

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: Om-Rohilla
    name: recall
  name_template: "v{{.Version}}"
  draft: false
  prerelease: auto

brews:
  - name: recall
    repository:
      owner: Om-Rohilla
      name: homebrew-tap
      token: "{{ .Env.GH_PAT }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: bump recall to {{ .Tag }}"
    homepage: "https://github.com/Om-Rohilla/recall"
    description: "100% offline command intelligence for your terminal — eliminate Command Amnesia"
    license: "MIT"
    skip_upload: auto
    install: |
      bin.install "recall"
    test: |
      system "#{bin}/recall", "--help"
